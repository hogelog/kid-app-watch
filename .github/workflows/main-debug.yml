name: Main debug build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  debug-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so versionCode can count commits monotonically.
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: current
          cache-write-only: true

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug --configuration-cache

      - name: Publish main debug release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="main-debug"
          APK_NAME="kidappwatch-main-${SHORT_SHA}-debug.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          META="android/app/build/outputs/apk/debug/output-metadata.json"
          VERSION_NAME=$(jq -r '.elements[0].versionName' "$META")
          VERSION_CODE=$(jq -r '.elements[0].versionCode' "$META")

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            --title "Main debug build (${SHORT_SHA})" \
            --notes "Automatic debug build of main at ${HEAD_SHA}\n\nVersion: ${VERSION_NAME} (${VERSION_CODE})" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"
